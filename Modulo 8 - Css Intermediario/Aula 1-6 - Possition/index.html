<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Exemplos de Position</h1>

    <!-- STATIC -->
    <section>
      <h2>Static</h2>
      <div class="box static">Static</div>
    </section>

    <!-- RELATIVE -->
    <section>
      <h2>Relative</h2>
      <div class="box relative">Relative</div>
    </section>

    <!-- ABSOLUTE -->
    <section>
      <h2>Absolute</h2>

      <div class="container">
        <div class="box absolute">Absolute</div>
      </div>
    </section>

    <!-- FIXED -->
    <section>
      <h2>Fixed</h2>
      <div class="box fixed">Fixed</div>
    </section>

    <!-- STICKY -->
    <section>
      <h2>Sticky</h2>

      <div class="sticky">Sticky Menu</div>

      <div class="content"></div>
    </section>
  </body>
</html>
