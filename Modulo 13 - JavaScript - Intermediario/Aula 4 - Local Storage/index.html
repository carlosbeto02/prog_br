    const h1Titulo = document.querySelector("#titulo");

    onload = () => {
      const textoFixo = localStorage.getItem("texto");
      h1Titulo.innerHTML = textoFixo;
    };

    const salvar = () => {
      console.log(inTexto.value);

      h1Titulo.innerHTML = inTexto.value;

      localStorage.setItem("texto", inTexto.value);
    };

    inTexto.addEventListener("input", salvar);
  </script>
