<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <!-- Cria um form de estados Selected ja deixa pro selecionado size a quantidade de opçoes q sera mostrado multiple selecioa mais de uma opção -->
  <body>
    <form method="GET" action="">
      <select name="estado" size="5" multiple>
        <option value="RJ">Rio de Janeiro</option>
        <option value="SP" selected>Sao Paulo</option>
      </select>
      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
