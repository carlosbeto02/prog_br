<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplos de Formulários</title>
  </head>
  <body>
    <h1>Formulários</h1>

    <!-- Formulário Básico -->
    <form method="POST" action="/cadastro">
      <h2>Campos de Texto</h2>

      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" />

      <br /><br />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" />

      <br /><br />

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" />

      <br /><br />

      <label for="idade">Idade</label>
      <input type="number" id="idade" name="idade" />

      <hr />

      <h2>Checkbox</h2>

      <input type="checkbox" id="react" name="curso1" value="React" />
      <label for="react">React</label>

      <br />

      <input type="checkbox" id="node" name="curso2" value="Node" />
      <label for="node">Node.js</label>

      <hr />

      <h2>Radio</h2>

      <input type="radio" id="masculino" name="sexo" value="m" checked />
      <label for="masculino">Masculino</label>

      <br />

      <input type="radio" id="feminino" name="sexo" value="f" />
      <label for="feminino">Feminino</label>

      <hr />

      <h2>Botões</h2>

      <input type="submit" value="Enviar" />

      <input type="reset" value="Limpar" />
    </form>

    <hr />

    <h1>Busca no YouTube</h1>

    <form method="GET" action="https://www.youtube.com/results">
      <input
        type="text"
        name="search_query"
        placeholder="Pesquisar no YouTube"
      />

      <input type="submit" value="Buscar" />
    </form>
  </body>
</html>
